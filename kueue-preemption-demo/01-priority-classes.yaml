# Kueue WorkloadPriorityClasses drive queueing/preemption order ONLY.
# (Unlike k8s PriorityClass, they do not affect kube-scheduler pod priority.)
# A workload with a higher value can preempt one with a lower value in the same ClusterQueue.
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: low-priority
value: 100
description: "Low-priority Ray workloads. Preemptible by higher-priority workloads."
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: WorkloadPriorityClass
metadata:
  name: high-priority
value: 1000
description: "High-priority Ray workloads. Can preempt lower-priority workloads."
